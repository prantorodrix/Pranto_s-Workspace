<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranto's Pro Tracker | Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fa;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.08);
        }

        textarea:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.05);
        }

        /* Logic for Dynamic Tags */
        .tag-disabled {
            background: #f1f5f9 !important;
            color: #cbd5e1 !important;
            border-color: #e2e8f0 !important;
            box-shadow: none !important;
            pointer-events: none;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .tag-enabled {
            pointer-events: auto;
            filter: grayscale(0);
            opacity: 1;
        }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">

    <!-- Compact Navigation -->
    <nav class="glass-nav border border-white/60 px-4 py-2 flex justify-between items-center rounded-2xl mb-3 shadow-sm sticky top-2 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center text-white shadow-md">
                <i class="fas fa-bolt text-xs"></i>
            </div>
            <h1 class="text-[10px] font-black uppercase tracking-widest text-slate-800 leading-none hidden sm:block">
                Pranto's Workspace <i class="fas fa-sparkles text-amber-400 ml-1"></i>
            </h1>
        </div>

        <div class="flex bg-slate-100/60 p-1 rounded-xl border border-slate-200/40">
            <button id="dayBtn" onclick="setShift('Day')" class="shift-btn px-3 py-1 rounded-lg text-[9px] font-black flex items-center gap-1.5 transition-all bg-white text-indigo-600 shadow-sm scale-105">
                <i class="fas fa-sun text-[10px]"></i> DAY
            </button>
            <button id="nightBtn" onclick="setShift('Night')" class="shift-btn px-3 py-1 rounded-lg text-[9px] font-black flex items-center gap-1.5 transition-all text-slate-400">
                <i class="fas fa-moon text-[10px]"></i> NIGHT
            </button>
        </div>
    </nav>

    <main class="space-y-3">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">
            <!-- Left: Input Area -->
            <div class="lg:col-span-7 xl:col-span-8">
                <div class="bg-white rounded-2xl p-3 border border-slate-200/50 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[9px] font-black text-indigo-500/70 uppercase tracking-widest flex items-center gap-1.5">
                            <i class="fas fa-plus-circle text-[10px]"></i> Entry
                        </span>
                    </div>
                    <textarea id="ticketInput" oninput="handleInput()" placeholder="Ticket ID..." class="w-full bg-slate-50/50 border border-slate-100 rounded-xl p-2 text-[11px] font-semibold text-slate-700 outline-none h-[38px] resize-none overflow-hidden transition-all shadow-inner"></textarea>
                    
                    <div id="tagContainer" class="flex flex-wrap gap-1 mt-2">
                        <!-- Tags rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Right: Summary Panel -->
            <div class="lg:col-span-5 xl:col-span-4">
                <div class="bg-white rounded-2xl p-3 border border-slate-200/50 shadow-sm h-full">
                    <div class="flex items-center justify-between mb-3">
                        <select id="dateFilter" onchange="updateSummary()" class="bg-slate-50 border border-slate-100 rounded-lg px-2 py-1 text-[9px] font-black text-indigo-600 outline-none uppercase">
                        </select>
                        <div class="flex items-center gap-2 bg-slate-900 rounded-xl px-3 py-1 shadow-md">
                            <i class="fas fa-chart-bar text-indigo-400 text-[10px]"></i>
                            <span id="totalCount" class="text-[10px] font-black text-white">0</span>
                        </div>
                    </div>
                    
                    <div id="statsGrid" class="grid grid-cols-5 gap-1">
                    </div>
                </div>
            </div>
        </div>

        <!-- Timeline Log -->
        <div class="bg-white rounded-2xl border border-slate-200/50 shadow-sm overflow-hidden">
            <div class="bg-slate-50/50 px-4 py-2 border-b border-slate-100 flex items-center justify-between uppercase tracking-widest text-[9px] font-black text-slate-400">
                <div class="flex items-center gap-2"><i class="fas fa-list"></i> Log</div>
                <div class="flex items-center gap-1"><div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div> Live</div>
            </div>

            <div id="historyContainer" class="overflow-y-auto max-h-[calc(100vh-250px)] p-2">
            </div>
        </div>
    </main>

    <footer class="mt-3 flex justify-between items-center px-4 py-2 bg-white/40 border border-white/60 rounded-xl opacity-60 text-[7px] font-black uppercase tracking-widest">
        <span>PRANTO SYSTEMS</span>
        <span class="text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-lg">v5.4 WEB-ELITE</span>
    </footer>

    <script>
        const tags = [
            { name: 'Appeal', color: 'from-blue-500 to-indigo-500' },
            { name: 'Claim Review', color: 'from-purple-500 to-fuchsia-500' },
            { name: 'Negotiation', color: 'from-emerald-500 to-teal-500' },
            { name: 'IDR', color: 'from-rose-500 to-pink-500' },
            { name: 'TDI', color: 'from-orange-500 to-amber-500' },
            { name: 'Offer letter', color: 'from-cyan-500 to-sky-500' },
            { name: 'Complaint', color: 'from-red-500 to-orange-500' },
            { name: 'PT Letter', color: 'from-indigo-600 to-purple-500' },
            { name: 'Follow-up', color: 'from-teal-500 to-green-500' },
            { name: 'Final Review', color: 'from-amber-500 to-orange-500' }
        ];

        let shift = 'Day';
        let production = JSON.parse(localStorage.getItem('pranto_production')) || [];

        function getShiftDate(s) {
            return new Intl.DateTimeFormat('en-GB', {
                timeZone: s === 'Night' ? 'America/New_York' : 'Asia/Dhaka', 
                day: '2-digit', month: 'short', year: 'numeric'
            }).format(new Date());
        }

        function handleInput() {
            const val = document.getElementById('ticketInput').value.trim();
            const tagBtns = document.querySelectorAll('.entry-tag');
            tagBtns.forEach(btn => {
                if (val.length > 0) {
                    btn.classList.remove('tag-disabled');
                    btn.classList.add('tag-enabled');
                } else {
                    btn.classList.add('tag-disabled');
                    btn.classList.remove('tag-enabled');
                }
            });
        }

        function setShift(s) {
            shift = s;
            document.querySelectorAll('.shift-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-105');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = s === 'Day' ? document.getElementById('dayBtn') : document.getElementById('nightBtn');
            activeBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-105');
            activeBtn.classList.remove('text-slate-400');
            renderAll();
        }

        function addEntry(tagName) {
            const ticketInput = document.getElementById('ticketInput');
            const val = ticketInput.value.trim();
            if(!val) return;

            const entry = {
                id: Date.now(),
                data: val,
                tag: tagName,
                shift: shift,
                date: getShiftDate(shift)
            };

            production.unshift(entry);
            localStorage.setItem('pranto_production', JSON.stringify(production));
            ticketInput.value = '';
            handleInput(); // Reset tag state
            renderAll();
        }

        function deleteEntry(id) {
            production = production.filter(p => p.id !== id);
            localStorage.setItem('pranto_production', JSON.stringify(production));
            renderAll();
        }

        function copyDate(d) {
            const text = production.filter(p => p.date === d)
                .map((p, i) => `${i + 1}. ${p.data} - ${p.tag}`).join('\n');
            
            const el = document.createElement("textarea");
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.querySelector(`[data-date="${d}"]`);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-[10px]"></i>';
            btn.classList.replace('bg-slate-900', 'bg-emerald-500');
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.replace('bg-emerald-500', 'bg-slate-900');
            }, 2000);
        }

        function renderAll() {
            renderTags();
            updateDateFilter();
            updateSummary();
            renderHistory();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            container.innerHTML = '';
            const val = document.getElementById('ticketInput').value.trim();
            
            tags.forEach(t => {
                const btn = document.createElement('button');
                btn.className = `entry-tag px-2.5 py-1.5 rounded-xl border text-[8px] font-black uppercase tracking-tighter transition-all active:scale-90 shadow-sm bg-gradient-to-r ${t.color} text-white border-transparent hover:brightness-110 ${val.length === 0 ? 'tag-disabled' : 'tag-enabled'}`;
                btn.innerText = t.name;
                btn.onclick = () => addEntry(t.name);
                container.appendChild(btn);
            });
        }

        function updateDateFilter() {
            const filter = document.getElementById('dateFilter');
            const currentSelected = filter.value;
            const uniqueDates = [...new Set(production.map(p => p.date))];
            const today = getShiftDate(shift);
            if(!uniqueDates.includes(today)) uniqueDates.push(today);
            uniqueDates.sort((a,b) => new Date(b) - new Date(a));
            filter.innerHTML = uniqueDates.map(d => `<option value="${d}">${d}</option>`).join('');
            if(currentSelected && uniqueDates.includes(currentSelected)) filter.value = currentSelected;
            else filter.value = today;
        }

        function updateSummary() {
            const selectedDate = document.getElementById('dateFilter').value;
            const statsGrid = document.getElementById('statsGrid');
            const filtered = production.filter(p => p.date === selectedDate);
            const counts = {};
            filtered.forEach(p => counts[p.tag] = (counts[p.tag] || 0) + 1);
            document.getElementById('totalCount').innerText = filtered.length;
            
            statsGrid.innerHTML = tags.map(t => {
                const count = counts[t.name] || 0;
                const isActive = count > 0;
                return `
                    <div class="rounded-xl flex flex-col items-center justify-center border transition-all p-1.5 ${isActive ? `bg-gradient-to-br ${t.color} border-transparent text-white shadow-sm` : 'bg-slate-50 border-slate-100 opacity-20'}">
                        <span class="text-[10px] font-black leading-none mb-0.5">${count}</span>
                        <span class="text-[5px] font-black uppercase tracking-tighter text-center opacity-80 truncate w-full">${t.name}</span>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            const grouped = {};
            production.forEach(p => {
                if(!grouped[p.date]) grouped[p.date] = [];
                grouped[p.date].push(p);
            });

            Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a)).forEach(d => {
                const dateHeader = `
                    <div class="bg-white/90 backdrop-blur-md px-3 py-1.5 flex items-center justify-between sticky top-0 z-10 border border-slate-100 rounded-xl shadow-xs mb-1.5 mt-2">
                        <div class="flex items-center gap-2 text-[9px] font-black text-slate-600 uppercase">
                            <i class="fas fa-calendar-alt text-indigo-400"></i>
                            ${d} <span class="bg-indigo-600 text-white px-2 py-0.5 rounded-lg ml-1 font-bold">${grouped[d].length}</span>
                        </div>
                        <button data-date="${d}" onclick="copyDate('${d}')" class="px-4 py-1 rounded-xl text-[9px] font-black uppercase transition-all shadow-sm bg-slate-900 text-white active:scale-95">
                            <i class="fas fa-copy text-[10px]"></i>
                        </button>
                    </div>
                `;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-1.5";
                grid.innerHTML = grouped[d].map((item, idx) => `
                    <div class="group flex flex-col border border-slate-50 p-2 rounded-xl bg-white hover:border-indigo-200 hover:shadow-lg transition-all relative overflow-hidden card-hover">
                        <div class="absolute left-0 top-0 w-1 h-full bg-gradient-to-b ${tags.find(t=>t.name===item.tag)?.color}"></div>
                        <div class="flex justify-between items-start mb-1 pl-1">
                            <span class="text-[7px] font-black text-slate-200">#${grouped[d].length - idx}</span>
                            <button onclick="deleteEntry(${item.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all">
                                <i class="fas fa-trash text-[10px]"></i>
                            </button>
                        </div>
                        <div class="flex flex-col pl-1">
                            <span class="text-[9px] font-bold text-slate-700 truncate leading-tight mb-0.5">${item.data}</span>
                            <span class="text-[6px] font-black uppercase text-slate-400 tracking-tighter">${item.tag}</span>
                        </div>
                    </div>
                `).join('');
                
                const div = document.createElement('div');
                div.innerHTML = dateHeader;
                div.appendChild(grid);
                container.appendChild(div);
            });
        }

        renderAll();
    </script>
</body>
</html>
