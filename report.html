<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranto's Pro Tracker | Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card-hover {
            transition: all 0.2s ease-in-out;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Excel-like Table Styling */
        .excel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .excel-table th {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            text-align: left;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .excel-table td {
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            background: white;
        }
        .excel-table tr:hover td {
            background: #f8fafc;
        }

        .tag-disabled {
            background: #f1f5f9 !important;
            color: #94a3b8 !important;
            border-color: #e2e8f0 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .tag-enabled {
            cursor: pointer;
            opacity: 1;
        }
        
        .entry-tag {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen">

    <!-- Navbar -->
    <nav class="glass-nav border border-slate-200 px-6 py-3 flex justify-between items-center rounded-2xl mb-6 shadow-sm sticky top-4 z-50">
        <div class="flex items-center gap-4 w-1/3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-violet-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-bolt text-lg"></i>
            </div>
            <div class="hidden sm:block">
                <h1 class="text-sm font-bold uppercase tracking-wider text-slate-900 leading-tight">Pranto's Workspace</h1>
                <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">Elite Productivity</p>
            </div>
        </div>

        <div class="flex justify-center w-1/3">
            <a href="index.html" class="flex items-center gap-2 px-5 py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-indigo-600 transition-all shadow-md active:scale-95">
                <i class="fas fa-home"></i>
                <span class="hidden md:inline">HOME</span>
            </a>
        </div>

        <div class="flex justify-end w-1/3">
            <div class="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                <button id="dayBtn" onclick="setShift('Day')" class="shift-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all bg-white text-indigo-600 shadow-sm">
                    <i class="fas fa-sun text-sm"></i> DAY
                </button>
                <button id="nightBtn" onclick="setShift('Night')" class="shift-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all text-slate-500">
                    <i class="fas fa-moon text-sm"></i> NIGHT
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto space-y-6">
        <!-- Input & Summary Section -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-plus-circle text-indigo-500"></i>
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">New Entry</span>
                    </div>
                    <textarea id="ticketInput" oninput="handleInput()" placeholder="Enter Ticket ID here..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-medium text-slate-700 outline-none h-20 resize-none transition-all placeholder:text-slate-400"></textarea>
                    <div id="tagContainer" class="flex flex-wrap gap-2 mt-4"></div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm h-full">
                    <div class="flex items-center justify-between mb-5">
                        <select id="dateFilter" onchange="updateSummary()" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold text-indigo-600 outline-none uppercase"></select>
                        <div class="flex items-center gap-2 bg-slate-900 rounded-xl px-4 py-1.5 shadow-lg">
                            <i class="fas fa-chart-pie text-indigo-400 text-xs"></i>
                            <span id="totalCount" class="text-sm font-bold text-white">0</span>
                        </div>
                    </div>
                    <div id="statsGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>
            </div>
        </div>

        <!-- History Log with View Switcher -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-widest">
                    <i class="fas fa-history"></i> Production Log
                </div>
                
                <!-- View Switcher -->
                <div class="flex bg-slate-200/50 p-1 rounded-xl border border-slate-200 self-start">
                    <button id="viewGrid" onclick="setView('grid')" class="view-btn px-4 py-1.5 rounded-lg text-[10px] font-black flex items-center gap-2 transition-all bg-white text-indigo-600 shadow-sm">
                        <i class="fas fa-th-large"></i> GRID VIEW
                    </button>
                    <button id="viewTable" onclick="setView('table')" class="view-btn px-4 py-1.5 rounded-lg text-[10px] font-black flex items-center gap-2 transition-all text-slate-500">
                        <i class="fas fa-table"></i> TABLE VIEW (EXCEL)
                    </button>
                </div>
            </div>

            <div id="historyContainer" class="p-6 space-y-8 overflow-x-auto min-h-[300px]">
                <!-- Log content will render here -->
            </div>
        </div>
    </main>

    <footer class="mt-8 flex justify-between items-center px-6 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
        <span>&copy; 2024 PRANTO SYSTEMS</span>
        <span class="text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full italic">v6.0 Excel Edition</span>
    </footer>

    <script>
        const tags = [
            { name: 'Appeal', color: 'from-blue-500 to-indigo-600' },
            { name: 'Claim Review', color: 'from-purple-500 to-violet-600' },
            { name: 'Negotiation', color: 'from-emerald-500 to-teal-600' },
            { name: 'IDR', color: 'from-rose-500 to-pink-600' },
            { name: 'TDI', color: 'from-orange-500 to-amber-600' },
            { name: 'Offer letter', color: 'from-cyan-500 to-blue-600' },
            { name: 'Complaint', color: 'from-red-500 to-orange-600' },
            { name: 'PT Letter', color: 'from-indigo-600 to-violet-700' },
            { name: 'Follow-up', color: 'from-teal-500 to-green-600' },
            { name: 'Final Review', color: 'from-amber-500 to-orange-600' }
        ];

        let shift = 'Day';
        let currentView = 'grid'; // Default view
        let production = JSON.parse(localStorage.getItem('pranto_production')) || [];

        function getShiftDate(s) {
            return new Intl.DateTimeFormat('en-GB', {
                timeZone: s === 'Night' ? 'America/New_York' : 'Asia/Dhaka', 
                day: '2-digit', month: 'short', year: 'numeric'
            }).format(new Date());
        }

        function setShift(s) {
            shift = s;
            document.querySelectorAll('.shift-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = s === 'Day' ? document.getElementById('dayBtn') : document.getElementById('nightBtn');
            activeBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
            activeBtn.classList.remove('text-slate-500');
            renderAll();
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = view === 'grid' ? document.getElementById('viewGrid') : document.getElementById('viewTable');
            activeBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
            activeBtn.classList.remove('text-slate-500');
            renderHistory();
        }

        function handleInput() {
            const val = document.getElementById('ticketInput').value.trim();
            document.querySelectorAll('.entry-tag').forEach(btn => {
                if (val.length > 0) { btn.classList.remove('tag-disabled'); btn.classList.add('tag-enabled'); }
                else { btn.classList.add('tag-disabled'); btn.classList.remove('tag-enabled'); }
            });
        }

        function addEntry(tagName) {
            const ticketInput = document.getElementById('ticketInput');
            const val = ticketInput.value.trim();
            if(!val) return;

            const entry = {
                id: Date.now(),
                data: val,
                tag: tagName,
                shift: shift,
                date: getShiftDate(shift),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            production.unshift(entry);
            localStorage.setItem('pranto_production', JSON.stringify(production));
            ticketInput.value = '';
            handleInput(); 
            renderAll();
        }

        function deleteEntry(id) {
            production = production.filter(p => p.id !== id);
            localStorage.setItem('pranto_production', JSON.stringify(production));
            renderAll();
        }

        function copyDate(d) {
            const text = production.filter(p => p.date === d).map((p, i) => `${i + 1}. ${p.data} - ${p.tag}`).join('\n');
            const el = document.createElement("textarea"); el.value = text;
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            
            const btn = document.querySelector(`[data-date="${d}"]`);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check mr-2"></i> Copied';
            btn.classList.replace('bg-slate-900', 'bg-emerald-600');
            setTimeout(() => { btn.innerHTML = original; btn.classList.replace('bg-emerald-600', 'bg-slate-900'); }, 2000);
        }

        function renderAll() {
            renderTags();
            updateDateFilter();
            updateSummary();
            renderHistory();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            container.innerHTML = '';
            const val = document.getElementById('ticketInput').value.trim();
            tags.forEach(t => {
                const btn = document.createElement('button');
                btn.className = `entry-tag px-4 py-2 rounded-xl border text-[11px] font-bold uppercase tracking-wider transition-all active:scale-95 shadow-sm bg-gradient-to-r ${t.color} text-white border-transparent hover:brightness-110 ${val.length === 0 ? 'tag-disabled' : 'tag-enabled'}`;
                btn.innerText = t.name;
                btn.onclick = () => addEntry(t.name);
                container.appendChild(btn);
            });
        }

        function updateDateFilter() {
            const filter = document.getElementById('dateFilter');
            const currentSelected = filter.value;
            const uniqueDates = [...new Set(production.map(p => p.date))];
            const today = getShiftDate(shift);
            if(!uniqueDates.includes(today)) uniqueDates.push(today);
            uniqueDates.sort((a,b) => new Date(b) - new Date(a));
            filter.innerHTML = uniqueDates.map(d => `<option value="${d}">${d}</option>`).join('');
            filter.value = (currentSelected && uniqueDates.includes(currentSelected)) ? currentSelected : today;
        }

        function updateSummary() {
            const selectedDate = document.getElementById('dateFilter').value;
            const statsGrid = document.getElementById('statsGrid');
            const filtered = production.filter(p => p.date === selectedDate);
            const counts = {};
            filtered.forEach(p => counts[p.tag] = (counts[p.tag] || 0) + 1);
            document.getElementById('totalCount').innerText = filtered.length;
            
            statsGrid.innerHTML = tags.map(t => {
                const count = counts[t.name] || 0;
                return `
                    <div class="rounded-xl flex flex-col items-center justify-center border transition-all p-3 ${count > 0 ? `bg-gradient-to-br ${t.color} border-transparent text-white shadow-md` : 'bg-slate-50 border-slate-100 opacity-40'}">
                        <span class="text-lg font-bold leading-none mb-1">${count}</span>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-center opacity-90 truncate w-full">${t.name}</span>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            const grouped = {};
            production.forEach(p => { if(!grouped[p.date]) grouped[p.date] = []; grouped[p.date].push(p); });
            const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));
            
            if(sortedDates.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-400 font-medium italic">No production recorded yet.</div>`;
                return;
            }

            sortedDates.forEach(d => {
                const section = document.createElement('div');
                section.className = "space-y-4";
                
                const header = `
                    <div class="flex items-center justify-between sticky top-0 bg-white/95 backdrop-blur-md py-3 z-10 border-b border-slate-100">
                        <div class="flex items-center gap-3">
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-tighter">${d}</h3>
                            <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100">${grouped[d].length} TOTAL UNITS</span>
                        </div>
                        <button data-date="${d}" onclick="copyDate('${d}')" class="px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all shadow-md bg-slate-900 text-white hover:bg-slate-800 active:scale-95 flex items-center gap-2">
                            <i class="fas fa-copy"></i> Copy Data
                        </button>
                    </div>
                `;
                
                let content = '';
                if(currentView === 'grid') {
                    content = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        ${grouped[d].map((item, idx) => `
                            <div class="group flex flex-col border border-slate-100 p-4 rounded-2xl bg-white card-hover relative overflow-hidden border-l-4 ${'border-l-' + tags.find(t=>t.name===item.tag)?.color.split('-')[1] + '-500'}">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-black text-slate-300">#${grouped[d].length - idx}</span>
                                    <button onclick="deleteEntry(${item.id})" class="text-slate-300 hover:text-rose-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button>
                                </div>
                                <h4 class="text-sm font-bold text-slate-800 break-all leading-snug mb-2">${item.data}</h4>
                                <div class="flex items-center justify-between mt-auto">
                                    <span class="text-[9px] font-black uppercase tracking-widest text-indigo-500">${item.tag}</span>
                                    <span class="text-[9px] font-bold text-slate-400 italic">${item.time}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                } else {
                    // Excel Table View
                    content = `
                        <div class="overflow-hidden border border-slate-200 rounded-xl shadow-sm">
                            <table class="excel-table">
                                <thead>
                                    <tr>
                                        <th width="50">#</th>
                                        <th>Ticket ID / Data</th>
                                        <th width="150">Category (Tag)</th>
                                        <th width="100">Time</th>
                                        <th width="100">Shift</th>
                                        <th width="80">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${grouped[d].map((item, idx) => `
                                        <tr>
                                            <td class="font-bold text-slate-400 text-center">${grouped[d].length - idx}</td>
                                            <td class="font-bold text-slate-800">${item.data}</td>
                                            <td>
                                                <span class="px-2 py-1 rounded-md text-[10px] font-black uppercase bg-gradient-to-r ${tags.find(t=>t.name===item.tag)?.color} text-white">
                                                    ${item.tag}
                                                </span>
                                            </td>
                                            <td class="text-slate-500 font-medium">${item.time}</td>
                                            <td class="text-slate-500 font-medium uppercase">${item.shift}</td>
                                            <td class="text-center">
                                                <button onclick="deleteEntry(${item.id})" class="text-slate-300 hover:text-rose-500 transition-colors">
                                                    <i class="fas fa-trash-alt text-xs"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                section.innerHTML = header + content;
                container.appendChild(section);
            });
        }

        renderAll();
    </script>
</body>
</html>
